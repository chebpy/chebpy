# This file is part of the jebel-quant/rhiza repository
# (https://github.com/jebel-quant/rhiza).
#
# Workflow: Sync
#
# Purpose: Synchronizes the repository with its upstream rhiza template.
#          On Renovate/rhiza branch push: auto-commits synced files directly
#          to the branch. On schedule/dispatch: opens a pull request.
#
# IMPORTANT: A PAT with 'workflow' scope (PAT_TOKEN) is required when workflow
#            files are modified. See .github/CONFIG.md for setup instructions.
#
# Trigger: On Renovate/rhiza branch push, weekly schedule, and manual dispatch.

name: "(RHIZA) SYNC"

permissions:
  contents: read

on:
  push:
    branches:
      - 'renovate/jebel-quant-rhiza-**'
      - 'rhiza/**'
    paths:
      - '.rhiza/template.yml'
  schedule:
    - cron: '0 0 * * 1'  # Weekly on Monday
  workflow_dispatch:
    inputs:
      create-pr:
        description: "Create a pull request"
        type: boolean
        default: true

jobs:
  sync:
    uses: jebel-quant/rhiza/.github/workflows/rhiza_sync.yml@v0.19.4
    with:
      direct: ${{ github.event_name == 'push' }}
      create-pr: ${{ github.event_name != 'push' && (github.event_name == 'schedule' || inputs.create-pr == true) }}
    secrets: inherit
    permissions:
      contents: write         # Commit/push synced files (direct mode)
      pull-requests: write    # Open the sync PR (scheduled/dispatch mode)
