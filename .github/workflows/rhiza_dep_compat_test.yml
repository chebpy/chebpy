name: "(RHIZA) DEPENDENCY COMPATIBILITY (WEEKLY)"

# Resolves all dependencies fresh—ignoring the committed lockfile—and runs
# the full test suite. Failure here means a newly-released package version
# (e.g. pydantic v3, scipy v2, numpy v3) is incompatible with the current
# code, providing an early-warning signal before the lockfile is next
# refreshed by Renovate or a manual bump.
#
# See: https://github.com/Jebel-Quant/basanos/issues/<issue-number>

permissions:
  contents: read

on:
  schedule:
    - cron: "0 9 * * 3"  # Every Wednesday at 09:00 UTC
  workflow_dispatch:

jobs:
  dep-compat-test:
    name: Test with latest compatible dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@v7.6.0
        with:
          version: "0.10.12"

      - name: Configure git auth for private packages
        uses: ./.github/actions/configure-git-auth
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Resolve and install latest compatible dependencies
        env:
          UV_EXTRA_INDEX_URL: ${{ secrets.UV_EXTRA_INDEX_URL }}
        run: |
          # --upgrade ignores the committed lockfile and resolves the newest
          # versions that satisfy pyproject.toml constraints.
          uv sync --upgrade

      - name: Show resolved package versions
        run: |
          echo "=== Installed package versions ==="
          uv pip list

      - name: Run tests
        env:
          UV_EXTRA_INDEX_URL: ${{ secrets.UV_EXTRA_INDEX_URL }}
        run: make test
