# This file is part of the jebel-quant/rhiza repository
# (https://github.com/jebel-quant/rhiza).
#
# Workflow: Semgrep
#
# Purpose: This workflow runs static analysis using Semgrep with local numpy
#          rules (.semgrep.yml) to detect common NumPy-related bugs and
#          security issues in Python code.
#          Note: the retired p/numpy registry ruleset is replaced by a local
#          rules file that covers the same concerns.
#
# Trigger: This workflow runs on every push and on pull requests to main/master
#          branches (including from forks)

name: "(RHIZA) SEMGREP"

# Permissions: Only read access to repository contents is needed
permissions:
    contents: read

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  semgrep:
    name: Semgrep (numpy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v7.6.0
        with:
          version: "0.10.12"

      - name: Configure git auth for private packages
        uses: ./.github/actions/configure-git-auth
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Run Semgrep
        env:
          UV_EXTRA_INDEX_URL: ${{ secrets.UV_EXTRA_INDEX_URL }}
        run: make semgrep
